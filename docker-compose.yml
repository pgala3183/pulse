# Pulse local stack — service DNS names (ADR 0002)
name: pulse

x-nest-env: &nest-env
  DEPLOYMENT_ENV: compose
  KAFKA_BROKERS: kafka:9092
  OTEL_EXPORTER_ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
  OTEL_SDK_DISABLED: "false"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pulse_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pulseminio
      MINIO_ROOT_PASSWORD: pulseminio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - pulse_minio:/data

  kafka:
    image: bitnami/kafka:3.9
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  zipkin:
    image: openzipkin/zipkin:3
    ports:
      - "9411:9411"

  prometheus:
    image: prom/prometheus:v3.2.1
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: pulse
      GF_SECURITY_ADMIN_PASSWORD: pulse
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3008:3000"
    depends_on:
      - prometheus

  ml-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ml
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 8

  api-gateway:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        APP: api-gateway
    environment:
      <<: *nest-env
      PORT: "3000"
      PULSE_API_KEY: dev-api-key
      ML_SERVICE_URL: http://ml-service:8000
      KAFKA_CLIENT_ID: api-gateway
    ports:
      - "3000:3000"
    depends_on:
      kafka:
        condition: service_healthy
      ml-service:
        condition: service_started
      zipkin:
        condition: service_started

  chat-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        APP: chat-service
    environment:
      <<: *nest-env
      PORT: "3002"
      KAFKA_CLIENT_ID: chat-service
    ports:
      - "3002:3002"
    depends_on:
      kafka:
        condition: service_healthy

  video-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        APP: video-service
    environment:
      <<: *nest-env
      PORT: "3003"
      ML_SERVICE_URL: http://ml-service:8000
      KAFKA_CLIENT_ID: video-service
    ports:
      - "3003:3003"
    depends_on:
      kafka:
        condition: service_healthy
      ml-service:
        condition: service_started

  sentiment-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        APP: sentiment-service
    environment:
      <<: *nest-env
      PORT: "3004"
      ML_SERVICE_URL: http://ml-service:8000
      KAFKA_CLIENT_ID: sentiment-service
      REDIS_URL: redis://redis:6379
    ports:
      - "3004:3004"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_started

  analytics-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        APP: analytics-service
    environment:
      <<: *nest-env
      PORT: "3005"
      KAFKA_CLIENT_ID: analytics-service
      DATABASE_URL: postgres://pulse:pulse@postgres:5432/pulse
    ports:
      - "3005:3005"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy

  recommendation-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        APP: recommendation-service
    environment:
      <<: *nest-env
      PORT: "3006"
      KAFKA_CLIENT_ID: recommendation-service
    ports:
      - "3006:3006"
    depends_on:
      kafka:
        condition: service_healthy

  video-capture-service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.nestjs
      args:
        APP: video-capture-service
    environment:
      <<: *nest-env
      PORT: "3007"
    ports:
      - "3007:3007"

  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    environment:
      NEXT_PUBLIC_GRAPHQL_HTTP_URL: http://localhost:3000/graphql
      NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3000/graphql
      NEXT_PUBLIC_PULSE_API_KEY: dev-api-key
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway

volumes:
  pulse_pg:
  pulse_minio:
