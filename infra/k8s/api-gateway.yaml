apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pulse
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/pgala3183/pulse-api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: DEPLOYMENT_ENV
              value: kubernetes
            - name: PORT
              value: "3000"
            - name: KAFKA_BROKERS
              value: kafka.pulse.svc.cluster.local:9092
            - name: ML_SERVICE_URL
              value: http://ml-service.pulse.svc.cluster.local:8000
            - name: OTEL_EXPORTER_ZIPKIN_ENDPOINT
              value: http://zipkin.pulse.svc.cluster.local:9411/api/v2/spans
            - name: PULSE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: pulse-api-key
                  key: api-key
                  optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pulse
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
