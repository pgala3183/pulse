apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
    spec:
      containers:
        - name: chat-service
          image: ghcr.io/pgala3183/pulse-chat-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: DEPLOYMENT_ENV
              value: kubernetes
            - name: PORT
              value: "3002"
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: pulse-observability
                  key: KAFKA_BROKERS
            - name: OTEL_EXPORTER_ZIPKIN_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: pulse-observability
                  key: OTEL_EXPORTER_ZIPKIN_ENDPOINT
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
---
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: pulse
spec:
  selector:
    app: chat-service
  ports:
    - port: 3002
      targetPort: 3002
