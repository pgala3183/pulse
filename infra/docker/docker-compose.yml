# Local stack — service names are DNS names (see ADR 0002-service-discovery)
services:
  api-gateway:
    build: ../../apps/api-gateway
    environment:
      DEPLOYMENT_ENV: compose
      PORT: "3000"
      ML_SERVICE_URL: http://ml-service:8000
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3000:3000"
    depends_on:
      - kafka
      - ml-service

  chat-service:
    environment:
      DEPLOYMENT_ENV: compose
      KAFKA_BROKERS: kafka:9092

  video-service:
    environment:
      DEPLOYMENT_ENV: compose
      ML_SERVICE_URL: http://ml-service:8000
      KAFKA_BROKERS: kafka:9092

  sentiment-service:
    environment:
      DEPLOYMENT_ENV: compose
      ML_SERVICE_URL: http://ml-service:8000
      KAFKA_BROKERS: kafka:9092

  analytics-service:
    environment:
      DEPLOYMENT_ENV: compose
      KAFKA_BROKERS: kafka:9092

  recommendation-service:
    environment:
      DEPLOYMENT_ENV: compose
      KAFKA_BROKERS: kafka:9092

  ml-service:
    build: ../../apps/ml-service
    ports:
      - "8000:8000"

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
